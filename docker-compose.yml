services:
  frontend:
    build:
      context: ./SPS/smart-parking-fe
      dockerfile: Dockerfile
    container_name: smart_parking_fe
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build: .
    container_name: fastapi_app
    environment:
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      ENABLE_MOCK_TOPUP: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./qrcodes:/app/qrcodes
    depends_on:
      - db

  db:
    image: mysql:8.4
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: parking_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: admin
      PMA_PASSWORD: 123456
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  mysqldata:
